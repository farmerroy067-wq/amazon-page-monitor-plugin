<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Monitor</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main>
      <h1 id="title">Amazon Page Monitor 1.0.0</h1>
      <p id="status">Ready.</p>

      <section class="card">
        <h2 id="currentDataTitle">Current Page Data</h2>
        <pre id="currentData">Not read</pre>
      </section>

      <section class="actions">
        <button id="refreshBtn">Refresh</button>
        <button id="saveBtn">Save Snapshot</button>
        <button id="exportBtn">Export JSON</button>
        <button id="clearBtn" class="danger">Clear History</button>
      </section>

      <section class="card">
        <h2 id="historyTitle">History</h2>
        <ul id="historyList"></ul>
      </section>
    </main>

    <script src="../src/i18n.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
